apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:latest
          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://localhost/gitlab'
                nginx['listen_port'] = 80
                nginx['listen_https'] = false
                gitlab_rails['initial_root_password'] = 'ChangeMe123!'
                gitlab_rails['gitlab_shell_ssh_port'] = 2222
          volumeMounts:
            - name: data
              mountPath: /var/opt/gitlab
            - name: logs
              mountPath: /var/log/gitlab
            - name: config
              mountPath: /etc/gitlab
          readinessProbe:
            httpGet:
              path: /gitlab/-/readiness
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
      volumes:
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: gitlab
spec:
  selector:
    app: gitlab
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: ssh
      port: 22
      targetPort: 22
