apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dns-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/pedromota533/kubernetes-intro
    targetRevision: HEAD
    path: k8s/kustomize/dns-server
  destination:
    server: https://kubernetes.default.svc
    namespace: dns
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
