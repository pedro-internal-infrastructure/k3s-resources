apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: main-gateway
  namespace: istio-ingress
spec:
  selector:
    istio: ingress  # targets the istio-ingress gateway pods
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.local"  # wildcard — catches all *.local domains
